kind = "web"
previewPath = "/"
title = "AI Website Builder"
version = "1.0.0"
id = "artifacts/ai-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21157
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-builder run dev"

[services.env]
PORT = "21157"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-builder", "run", "build"]
publicDir = "artifacts/ai-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
