openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: Website generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateWebsite
      tags: [generate]
      summary: Generate a website from a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateWebsiteBody"
      responses:
        "200":
          description: Generated website HTML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateWebsiteResponse"
  /generations:
    get:
      operationId: listGenerations
      tags: [generate]
      summary: List recent website generations
      responses:
        "200":
          description: List of recent generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateWebsiteBody:
      type: object
      properties:
        prompt:
          type: string
          description: Description of the website to generate
        model:
          type: string
          enum: ["openai", "claude"]
          description: AI model to use for generation
      required:
        - prompt
    GenerateWebsiteResponse:
      type: object
      properties:
        html:
          type: string
          description: The generated HTML for the website
        prompt:
          type: string
          description: The original prompt used
      required:
        - html
        - prompt
    Generation:
      type: object
      properties:
        id:
          type: integer
        prompt:
          type: string
        html:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - prompt
        - html
        - createdAt
